version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: hr_crm_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: hr_crm

  mongo-express:
    image: mongo-express
    container_name: hr_crm_mongo_ui
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH: 'false'
    depends_on:
      - mongodb

volumes:
  mongo_data:
